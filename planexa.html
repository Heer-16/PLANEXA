<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Planexa — Create. Host. Explore.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ── Paste your Firebase config object here to enable real-time sync ── */
window.FIREBASE_CONFIG = null;
window.FB = { OK: false };
if (window.FIREBASE_CONFIG) {
  const s = document.createElement('script');
  s.type = 'module';
  s.textContent = `
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
             updateDoc, deleteDoc, onSnapshot, query, where, orderBy,
             serverTimestamp, increment, arrayUnion, arrayRemove }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    try {
      const app  = initializeApp(window.FIREBASE_CONFIG);
      const db   = getFirestore(app);
      const auth = getAuth(app);
      window.FB  = { OK:true, db, auth, collection, doc, addDoc, setDoc, getDoc,
        getDocs, updateDoc, deleteDoc, onSnapshot, query, where, orderBy,
        serverTimestamp, increment, arrayUnion, arrayRemove,
        signInWithEmailAndPassword, createUserWithEmailAndPassword,
        signOut, onAuthStateChanged };
    } catch(e) { console.warn('Firebase init failed:', e.message); }
  `;
  document.head.appendChild(s);
}
</script>
<style>
/* ═══════════════════════════════ TOKENS ═══════════════════════════════ */
:root {
  --p:       #7C3AED; --p-l: #EDE9FE; --p-d: #5B21B6;
  --pk:      #EC4899; --pk-l:#FCE7F3;
  --or:      #F97316; --or-l:#FFEDD5;
  --ye:      #EAB308; --ye-l:#FEF3C7;
  --gr:      #10B981; --gr-l:#D1FAE5;
  --re:      #EF4444; --re-l:#FEE2E2;
  --bg:      #F1F5F9;
  --card:    #FFFFFF;
  --bdr:     #E2E8F0;
  --t1:      #0F172A; --t2:#475569; --t3:#94A3B8;
  --font-h:  'Poppins', sans-serif;
  --font-b:  'Inter', sans-serif;
  --r:       14px; --r-lg:20px; --r-xl:28px;
  --sh:      0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  --sh-lg:   0 8px 32px rgba(0,0,0,.1);
  --sidebar: 252px; --topbar: 60px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:var(--font-b); background:var(--bg); color:var(--t1); font-size:14px; line-height:1.55; }
button { cursor:pointer; font-family:inherit; border:none; outline:none; }
input, select, textarea { font-family:inherit; outline:none; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:99px; }
.hidden { display:none !important; }

/* ═══════════════════════ LOGIN ═══════════════════════ */
#pg-login {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1e1b4b 0%,#4c1d95 40%,#831843 80%,#7c2d12 100%);
  position:relative; overflow:hidden;
}
#pg-login::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 25% 20%, rgba(124,58,237,.35) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 75%, rgba(236,72,153,.25) 0%, transparent 55%);
}
.login-wrap {
  position:relative; z-index:1; display:grid;
  grid-template-columns:1fr 1fr; max-width:880px; width:95%;
  background:rgba(255,255,255,.07); backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.14); border-radius:28px;
  box-shadow:0 40px 80px rgba(0,0,0,.45); overflow:hidden;
}
.login-left { padding:44px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background:linear-gradient(160deg,rgba(124,58,237,.3),rgba(236,72,153,.2)); }
.login-logo { width:60px;height:60px;background:transparent;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:22px; }
.login-left h1 { font-family:var(--font-h);font-size:42px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:8px; }
.login-left p { color:rgba(255,255,255,.55);font-size:14px;margin-bottom:28px; }
.demo-tile { display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:13px 15px;cursor:pointer;transition:all .2s;margin-bottom:8px; }
.demo-tile:hover { background:rgba(255,255,255,.18);transform:translateX(4px); }
.demo-tile-icon { width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
.demo-tile-name { color:#fff;font-weight:700;font-size:13px; }
.demo-tile-cred { color:rgba(255,255,255,.45);font-size:11px;margin-top:1px; }
.login-right { padding:44px;display:flex;flex-direction:column;justify-content:center; }
.login-right h2 { font-family:var(--font-h);font-size:24px;font-weight:800;color:#fff;margin-bottom:4px; }
.login-right .sub { color:rgba(255,255,255,.45);font-size:13px;margin-bottom:26px; }
.l-label { display:block;color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:5px; }
.l-input { width:100%;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.18);border-radius:11px;padding:12px 15px;color:#fff;font-size:13px;transition:all .2s;margin-bottom:14px; }
.l-input::placeholder { color:rgba(255,255,255,.3); }
.l-input:focus { border-color:var(--pk);background:rgba(255,255,255,.14); }
.l-input option { background:#1e1b4b; }
.btn-sign-in { width:100%;padding:13px;border-radius:11px;background:linear-gradient(90deg,var(--pk),var(--or));color:#fff;font-weight:700;font-size:14px;transition:all .2s;box-shadow:0 4px 20px rgba(236,72,153,.4); }
.btn-sign-in:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(236,72,153,.5); }
.l-err { background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:9px 13px;border-radius:9px;font-size:12px;margin-bottom:12px; }

/* ═══════════════════════ APP SHELL ═══════════════════════ */
#app { display:none; height:100vh; overflow:hidden; flex-direction:row; }
/* app shown via inline style */

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar {
  width:var(--sidebar); background:var(--card);
  border-right:1px solid var(--bdr); display:flex;
  flex-direction:column; flex-shrink:0; overflow-y:auto;
}
.sb-head { padding:18px; background:var(--p-d); }
.sb-brand { display:flex;align-items:center;gap:9px;margin-bottom:14px; }
.sb-icon { width:90px;height:36px;background:transparent;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden; }
.sb-name { font-family:var(--font-h);font-size:16px;font-weight:800;color:#fff; }
.sb-uni { font-size:11px;color:rgba(255,255,255,.45);margin-top:-1px; }
.sb-user { display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.1);border-radius:12px;padding:10px 12px; }
.sb-av { width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--pk),var(--or));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px;flex-shrink:0; }
.sb-uname { color:#fff;font-weight:700;font-size:12px; }
.sb-urole { color:rgba(255,255,255,.45);font-size:10px; }
.sb-nav { flex:1;padding:10px; }
.nav-sec { font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:12px 8px 5px; }
.ni {
  display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:11px;
  color:var(--t2);font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;margin-bottom:1px;
}
.ni .nico { width:30px;height:30px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .18s;flex-shrink:0; }
.ni:hover { background:var(--bg);color:var(--p); }
.ni:hover .nico { background:var(--p-l); }
.ni.on { background:linear-gradient(90deg,var(--p),var(--pk));color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.28); }
.ni.on .nico { background:rgba(255,255,255,.18); }
.sb-foot { padding:10px;border-top:1px solid var(--bdr); }
.btn-logout { width:100%;display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:11px;color:var(--re);font-weight:600;font-size:13px;background:transparent;transition:all .18s; }
.btn-logout:hover { background:var(--re-l); }

/* ═══════════════════════ MAIN ═══════════════════════ */
.main { flex:1;display:flex;flex-direction:column;overflow:hidden; }
.topbar {
  height:var(--topbar);background:var(--card);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;
}
.tb-left { display:flex;align-items:center;gap:10px; }
.btn-back { width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);border:none;cursor:pointer;transition:all .18s; }
.btn-back:hover { background:var(--p-l);color:var(--p); }
.tb-title { font-family:var(--font-h);font-size:17px;font-weight:800;color:var(--t1); }
.tb-right { display:flex;align-items:center;gap:10px;position:relative; }
.notif-btn { position:relative;width:36px;height:36px;border-radius:9px;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer; }
.notif-dot { position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--pk);border-radius:99px;border:1.5px solid #fff; }
.tb-av { width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--p),var(--pk));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px; }
.tb-uname { font-weight:700;font-size:13px; }
.tb-role { font-size:11px;color:var(--t3); }

/* ═══════════════════════ CONTENT ═══════════════════════ */
.content { flex:1;overflow-y:auto;padding:22px; }
.view { display:none;animation:fadeUp .22s ease; }
.view.on { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════ COMPONENTS ═══════════════════════ */
/* ── Grid helpers ── */
.g2 { display:grid;grid-template-columns:repeat(2,1fr);gap:16px; }
.g3 { display:grid;grid-template-columns:repeat(3,1fr);gap:16px; }
.g4 { display:grid;grid-template-columns:repeat(4,1fr);gap:16px; }
.ga { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px; }

/* ── Cards ── */
.card { background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--sh); }
.card-click { cursor:pointer;transition:all .2s; }
.card-click:hover { border-color:var(--p);box-shadow:var(--sh-lg);transform:translateY(-2px); }

/* ── Stat card ── */
.scard {
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:18px 20px;display:flex;flex-direction:column;gap:4px;
  cursor:pointer;transition:all .2s;box-shadow:var(--sh);
}
.scard:hover { border-color:var(--p);box-shadow:var(--sh-lg);transform:translateY(-1px); }
.scard-icon { width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:6px; }
.scard-val { font-family:var(--font-h);font-size:26px;font-weight:800;color:var(--t1); }
.scard-lbl { font-size:13px;font-weight:600;color:var(--t2); }
.scard-sub { font-size:11px;color:var(--t3); }
.scard-trend { font-size:10px;font-weight:700;background:var(--gr-l);color:var(--gr);padding:2px 7px;border-radius:99px;align-self:flex-start; }

/* ── Badges ── */
.b { display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1.5px solid; }
.b-p  { background:var(--p-l);  color:var(--p);  border-color:rgba(124,58,237,.2);  }
.b-pk { background:var(--pk-l); color:var(--pk); border-color:rgba(236,72,153,.2);  }
.b-g  { background:var(--gr-l); color:var(--gr); border-color:rgba(16,185,129,.2);  }
.b-y  { background:var(--ye-l); color:#92400e;   border-color:rgba(234,179,8,.2);   }
.b-o  { background:var(--or-l); color:var(--or); border-color:rgba(249,115,22,.2);  }
.b-r  { background:var(--re-l); color:var(--re); border-color:rgba(239,68,68,.2);   }
.b-bl { background:#DBEAFE;     color:#1d4ed8;   border-color:rgba(29,78,216,.2);   }

/* ── Buttons ── */
.btn  { display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:all .17s; }
.btn-pri  { background:linear-gradient(90deg,var(--pk),var(--or));color:#fff;box-shadow:0 3px 12px rgba(236,72,153,.25); }
.btn-pri:hover  { opacity:.9;transform:translateY(-1px); }
.btn-sec  { background:var(--p-l);color:var(--p);border:1.5px solid rgba(124,58,237,.2); }
.btn-sec:hover  { background:var(--p);color:#fff; }
.btn-ghost{ background:var(--bg);color:var(--t2);border:1.5px solid var(--bdr); }
.btn-ghost:hover{ background:var(--bdr); }
.btn-danger{ background:var(--re-l);color:var(--re);border:1.5px solid rgba(239,68,68,.2); }
.btn-danger:hover{ background:var(--re);color:#fff; }
.btn-success{ background:var(--gr-l);color:var(--gr);border:1.5px solid rgba(16,185,129,.2); }
.btn-success:hover{ background:var(--gr);color:#fff; }
.btn-sm { padding:6px 13px;font-size:12px;border-radius:8px; }
.btn-xs { padding:4px 10px;font-size:11px;border-radius:7px; }
.btn-w  { width:100%;display:flex; }

/* ── Form ── */
.fl { display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.04em; }
.fi { width:100%;border:1.5px solid var(--bdr);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--t1);background:var(--card);transition:border .17s; }
.fi:focus { border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.1); }
.fi::placeholder { color:var(--t3); }
textarea.fi { resize:vertical;min-height:76px; }
.fg { margin-bottom:14px; }
.fgrid { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
.fc2 { grid-column:span 2; }

/* ── Table ── */
.tbl-wrap { overflow-x:auto; }
table { width:100%;border-collapse:collapse; }
th { padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1.5px solid var(--bdr); }
td { padding:11px 13px;font-size:13px;color:var(--t2);border-bottom:1px solid #F8FAFC; }
tr:last-child td { border-bottom:none; }
tbody tr { cursor:pointer;transition:background .13s; }
tbody tr:hover { background:var(--bg); }
.cell-t { font-weight:700;color:var(--t1);font-size:13px; }
.cell-s { font-size:11px;color:var(--t3);margin-top:1px; }

/* ── Section title ── */
.sec-title { font-family:var(--font-h);font-size:15px;font-weight:800;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between; }

/* ── Cap bar ── */
.cap-bar-row { display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:3px; }
.cap-bar { height:5px;background:#E2E8F0;border-radius:99px;overflow:hidden; }
.cap-fill { height:100%;border-radius:99px;transition:width .4s; }

/* ── Divider ── */
.div { height:1px;background:var(--bdr);margin:16px 0; }

/* ── Empty ── */
.empty { text-align:center;padding:48px 20px; }
.empty-ico { font-size:48px;margin-bottom:10px; }
.empty h3 { font-family:var(--font-h);font-size:16px;font-weight:800;margin-bottom:5px; }
.empty p { font-size:13px;color:var(--t3);max-width:220px;margin:0 auto 16px; }

/* ── Participant card ── */
.p-row { display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:11px;background:var(--bg);transition:all .15s;cursor:pointer;margin-bottom:7px; }
.p-row:hover { background:var(--p-l);border-color:var(--p); }
.p-av { width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex-shrink:0; }

/* ── Modal ── */
.modal-bg { position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .2s; }
.modal { background:var(--card);border-radius:var(--r-xl);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.2); }
.modal-head { padding:22px 24px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:5; }
.modal-htitle { font-family:var(--font-h);font-size:18px;font-weight:800; }
.modal-close { width:30px;height:30px;border-radius:99px;background:var(--bg);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s; }
.modal-close:hover { background:var(--re-l);color:var(--re); }
.modal-body { padding:22px 24px; }
.modal-foot { padding:14px 24px;border-top:1px solid var(--bdr);display:flex;gap:9px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card); }

/* ── Chart ── */
.ch-card { background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--sh); }
.ch-title { font-family:var(--font-h);font-size:14px;font-weight:800;margin-bottom:4px; }
.ch-sub { font-size:11px;color:var(--t3);margin-bottom:14px; }
.ch-wrap { position:relative;height:200px; }

/* ── Event hero card ── */
.ev-hero { border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px; }
.ev-hero-inner { height:190px;display:flex;align-items:flex-end;padding:22px;position:relative; }
.ev-hero-shade { position:absolute;inset:0;background:linear-gradient(to bottom,transparent 20%,rgba(0,0,0,.65)); }
.ev-hero-cnt { position:relative;z-index:1;color:#fff; }
.ev-hero-emoji { font-size:44px;display:block;margin-bottom:8px; }
.ev-hero-title { font-family:var(--font-h);font-size:24px;font-weight:800;line-height:1.15; }

/* ── Info grid ── */
.ig { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px; }
.ig-item { background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px; }
.ig-lbl { font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px; }
.ig-val { font-size:13px;font-weight:700;color:var(--t1); }

/* ── Notif panel ── */
.notif-panel { position:absolute;right:0;top:46px;width:310px;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh-lg);z-index:200; }
.notif-item { display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid #F8FAFC;cursor:pointer;transition:background .13s; }
.notif-item:hover { background:var(--bg); }
.notif-item:last-child { border-bottom:none; }
.n-dot { width:7px;height:7px;border-radius:99px;flex-shrink:0;margin-top:5px; }

/* ── Toast ── */
#toasts { position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
.toast { background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:12px 16px;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;animation:slideIn .28s ease;min-width:260px; }
@keyframes slideIn { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }

/* ── QR ── */
.qr-wrap { display:inline-block;background:var(--p-l);border:2px solid rgba(124,58,237,.2);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .17s; }
.qr-wrap:hover { background:#fff;border-color:var(--p);box-shadow:var(--sh); }
.qr-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:2px;width:84px;margin:0 auto 5px; }
.qr-cell { width:12px;height:12px;border-radius:2px; }
.qr-lbl { font-size:10px;font-weight:800;color:var(--p);font-family:monospace; }
.qr-sub { font-size:10px;color:var(--t3); }

/* ── Live dot ── */
.live { display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gr); }
.live-dot { width:7px;height:7px;border-radius:99px;background:var(--gr);animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }

/* ── Toggle ── */
.tog-wrap { display:flex;background:var(--bg);border-radius:9px;padding:3px;gap:2px; }
.tog-opt { flex:1;padding:7px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .17s;text-align:center;color:var(--t2); }
.tog-opt.on { background:var(--card);color:var(--p);box-shadow:0 1px 6px rgba(0,0,0,.08); }

/* ── Search ── */
.srch-wrap { position:relative;flex:1; }
.srch-ico { position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none; }
.srch-in { width:100%;border:1.5px solid var(--bdr);border-radius:10px;padding:10px 13px 10px 36px;font-size:13px;color:var(--t1);background:var(--card);transition:border .17s; }
.srch-in:focus { border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.1); }

/* ── Real-time pulse ── */
.rt-badge { display:inline-flex;align-items:center;gap:4px;background:var(--gr-l);color:var(--gr);border:1px solid rgba(16,185,129,.2);border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700; }

/* ═══════════════════════ RESPONSIVE ═══════════════════════ */
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .sidebar{display:none} .login-wrap{grid-template-columns:1fr} .login-left{display:none}
  .g4,.g3,.g2,.ig,.fgrid{grid-template-columns:1fr} .fc2{grid-column:span 1}
}

</style>

  REGS = {};
  EVENTS_SEED.forEach(e=>{

  // Ensure all event IDs have WAIT entries
  EVENTS_SEED.forEach(e=>{ if(!WAIT[e.id]) WAIT[e.id]=[]; });

  // Auto-mark payments as paid for past events' attended participants
  const now = new Date();
  EVENTS_SEED.filter(e=>!e.free&&e.status==="approved"&&new Date(e.date)<now).forEach(ev=>{
    if(!PAYMENTS[ev.id]) PAYMENTS[ev.id]={};
    const attended=ATTENDANCE[ev.id]||[];
    const organizers=(ev.organizers||[ev.orgId]);
    attended.forEach(email=>{
      if(!PAYMENTS[ev.id][email]){
        if(organizers.includes(email)){
          PAYMENTS[ev.id][email]={status:"waived",method:null,amount:0,date:ev.date};
        } else {
          // Assign random method for realism
          let h=0; for(let i=0;i<email.length;i++){h=Math.imul(31,h)+email.charCodeAt(i)|0;} h=Math.abs(h);
          PAYMENTS[ev.id][email]={status:"paid",method:h%2===0?"online":"cash",amount:ev.price,date:ev.date};
        }
      } else if(PAYMENTS[ev.id][email].status==="pending"&&!organizers.includes(email)){
        // Fix any still-pending entries for past events
        let h=0; for(let i=0;i<email.length;i++){h=Math.imul(31,h)+email.charCodeAt(i)|0;} h=Math.abs(h);
        PAYMENTS[ev.id][email]={status:"paid",method:h%2===0?"online":"cash",amount:ev.price,date:ev.date};
      }
    });
  });

  // Seed feedback notifications for past events (events whose date is in the past)
  EVENTS_SEED.filter(e=>new Date(e.date)<now && e.status==="approved").forEach(ev=>{
    (REGS[ev.id]||[]).forEach(email=>{

    });
  });
}

// ── REAL QR CODE ENGINE (qrcode.js) ──────────────────────────
let _qrSeq = 0;

// Renders a real QR code into element with given id after it's in the DOM
function _renderQR(id, seed, sizePx) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el || !window.QRCode) return;
    el.innerHTML = '';
    try {
      new QRCode(el, {
        text: (seed || 'PLANEXA').slice(0, 200), // QR has data limit
        width: sizePx,
        height: sizePx,
        colorDark: '#1a1240',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      // Clean up QRCode.js styling artifacts
      const img = el.querySelector('img');
      if (img) { img.style.cssText = 'display:block;margin:0 auto;border:none;max-width:100%'; }
      const cvs = el.querySelector('canvas');
      if (cvs) { cvs.style.cssText = 'display:block;margin:0 auto;border:none;max-width:100%'; }
    } catch(e) { el.innerHTML = '<div style="font-size:9px;color:#9e94b0;padding:4px">QR</div>'; }
  }, 80);
}

// Inline QR placeholder (used inside template literals) — size param = cell size in px
function qrHTML(seed, size = 14) {
  const id = 'qr-' + (++_qrSeq) + '-' + Math.random().toString(36).slice(2, 5);
  const px = Math.max(56, size * 7);
  _renderQR(id, seed, px);
  return `<div id="${id}" style="width:${px}px;height:${px}px;overflow:hidden;flex-shrink:0;background:#f8f6fb;border-radius:4px;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;color:#b0a8c0">QR</span></div>`;
}

// Larger standalone QR block — sizePx = total pixel width/height of QR image
function qrDiv(seed, sizePx = 120) {
  const id = 'qrd-' + (++_qrSeq) + '-' + Math.random().toString(36).slice(2, 5);
  _renderQR(id, seed, sizePx);
  return `<div id="${id}" style="width:${sizePx}px;height:${sizePx}px;overflow:hidden;flex-shrink:0;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;margin:0 auto"><span style="font-size:9px;color:#b0a8c0">loading…</span></div>`;
}


// Larger standalone QR — returns a self-contained div that renders a real QR code
function qrDiv(seed, sizePx=120){
  const id="qrd-"+(_qrSeq++)+"-"+Math.random().toString(36).slice(2,6);

/* ═══════════════════════════════════════════════════════════════
   FIREBASE REAL-TIME SYNC
   ═══════════════════════════════════════════════════════════════ */
async function firebaseRegister(eventId, userEmail) {
  if(!window.FB?.OK) return;
  try {
    const { db,doc,updateDoc,arrayUnion,collection,addDoc,setDoc,serverTimestamp } = window.FB;
    // add to registrations subcollection
    await setDoc(doc(db,`registrations/${eventId}_${userEmail}`),{
      eventId, email:userEmail, registeredAt:serverTimestamp()
    });
    // increment event registered count
    await updateDoc(doc(db,"events",eventId),{ registered:window.FB.increment(1) });
  } catch(e){ console.warn("FB reg error:",e.message); }
}

async function firebaseUnregister(eventId, userEmail) {
  if(!window.FB?.OK) return;
  try {
    const { db,doc,deleteDoc,updateDoc,increment } = window.FB;
    await deleteDoc(doc(db,`registrations/${eventId}_${userEmail}`));
    await updateDoc(doc(db,"events",eventId),{ registered:increment(-1) });
  } catch(e){ console.warn("FB unreg error:",e.message); }
}

async function firebaseSaveEvent(ev) {
  if(!window.FB?.OK) return;
  try {
    const { db,doc,setDoc } = window.FB;
    await setDoc(doc(db,"events",ev.id),ev);
  } catch(e){ console.warn("FB save error:",e.message); }
}

/* Live listener for registrations of one event */
function listenEventRegs(eventId, onUpdate) {
  if(!window.FB?.OK) return;
  try {
    const { db,collection,query,where,onSnapshot } = window.FB;
    const q = query(collection(db,"registrations"),where("eventId","==",eventId));
    const unsub = onSnapshot(q,snap=>{
      const emails = snap.docs.map(d=>d.data().email);
      onUpdate(emails);
    });
    unsubscribers.push(unsub);
  } catch(e){}
}

function stopListeners(){ unsubscribers.forEach(u=>u&&u()); unsubscribers=[]; }

function openChatWithParticipant(evId, participantEmail){
  go("p-org-chat", true, {evId:evId, participantEmail:participantEmail, orgEmail:CU.email});
}

function buildParticipantMsgsPanel(){
  const myEvIds=EVTS.filter(e=>(e.organizers||[e.orgId]).includes(CU.email)).map(e=>e.id);
  const threads=[];
  Object.keys(CHATS).forEach(key=>{
    if(key.startsWith("porgchat_")){
      const parts=key.split("_");
      const evId=parts[1];
      const partEmail=parts.slice(2).join("_");
      if(myEvIds.includes(evId)&&partEmail!==CU.email&&(CHATS[key]||[]).length>1){
        const ev2=EVTS.find(e=>e.id===evId);
        const pInfo=PARTICIPANTS_DB[partEmail]||{name:partEmail.split("@")[0],av:"??"};
        const lastMsg=CHATS[key][CHATS[key].length-1];
        threads.push({evId,partEmail,ev2,pInfo,lastMsg});
      }
    }
  });
  if(!threads.length) return "";
  let html="<div class='card' style='margin-top:16px'><div class='sec-title'>💬 Participant Messages <span class='b b-p' style='font-size:11px'>"+threads.length+"</span></div>";
  threads.forEach(t=>{
    const av=(t.pInfo.av||"??").toUpperCase().slice(0,2);
    const gc=gradCss(av);
    const lastText=(t.lastMsg&&t.lastMsg.text)?t.lastMsg.text.slice(0,40):"...";
    const lastTime=(t.lastMsg&&t.lastMsg.time)?t.lastMsg.time:"";
    const evTitle=(t.ev2&&t.ev2.title)?t.ev2.title:t.evId;
    const safeEvId=t.evId.replace(/['"]/g,"");
    const safePartEmail=t.partEmail.replace(/['"]/g,"");
    html+="<div style='display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;cursor:pointer' data-evid='"+safeEvId+"' data-partemail='"+safePartEmail+"' onclick='var el=this;openChatWithParticipant(el.dataset.evid,el.dataset.partemail)'>"
      +"<div style='width:36px;height:36px;border-radius:9px;background:"+gc+";display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px;flex-shrink:0'>"+av+"</div>"
      +"<div style='flex:1;min-width:0'><div style='font-weight:700;font-size:13px'>"+t.pInfo.name+"</div>"
      +"<div style='font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+evTitle+": "+lastText+"</div></div>"
      +"<span style='font-size:10px;color:var(--t3)'>"+lastTime+"</span></div>";
  });
  html+="</div>";
  return html;
}

function startOrgChat(evId){
  const ev=EVTS.find(e=>e.id===evId);
  if(!ev){toast("Event not found","re");return;}
  const orgs=(ev.organizers||[ev.orgId]).filter(Boolean);
  const orgEmail=orgs.find(e=>e!==CU.email)||orgs[0]||ev.orgId||"";
  go("p-org-chat",true,{evId:evId,orgEmail:orgEmail});
}

// Alias: re-render current view
function rerender(){
  const cur=history[history.length-1];
  if(cur) go(cur.id,false,cur.data);
}

function go(viewId, push=true, data=null){
  destroyCharts();
  const area=$("content"); area.innerHTML="";
  const title=TITLES[viewId]||viewId;
  $("tb-title").textContent=title;
  const isTop=NAV_MAP[CU.role]?.some(n=>n.id===viewId);
  $("btn-back").classList.toggle("hidden",isTop);
  if(isTop) setNavActive(viewId);
  if(push) history.push({id:viewId,data});
  // Show/hide topbar search based on view
  if(typeof showTopbarSearch==="function") showTopbarSearch(true);
  const render=VIEWS[viewId];
  if(render) render(area,data);
  else area.innerHTML=`<div class="empty"><div class="empty-ico">🚧</div><h3>Coming Soon</h3><p>This section is under construction.</p></div>`;
}

function goBack(){
  if(history.length>1){ history.pop(); const prev=history[history.length-1]; go(prev.id,false,prev.data); }
}

function scard(ico,val,lbl,sub,colorCls,onClick="",trend=""){
  const bgs={p:"var(--p-l)",pk:"var(--pk-l)",or:"var(--or-l)",ye:"var(--ye-l)",gr:"var(--gr-l)"};
  const txts={p:"var(--p)",pk:"var(--pk)",or:"var(--or)",ye:"#92400e",gr:"var(--gr)"};
  const [bg,tx]=colorCls.split("-").length===1?[bgs[colorCls],txts[colorCls]]:[bgs[colorCls.split("-")[0]],txts[colorCls.split("-")[0]]];
  return `<div class="scard" ${onClick?`onclick="${onClick}"`:""}> 
    <div class="scard-icon" style="background:${bg||bgs.p};color:${tx||txts.p}">${ico}</div>
    <div class="scard-val">${val}</div>
    <div class="scard-lbl">${lbl}</div>
    ${sub?`<div class="scard-sub">${sub}</div>`:""}
    ${trend?`<div class="scard-trend">↑ ${trend}</div>`:""}
  </div>`;
}

function evCard(ev, role, userEmail=""){
  const regs=REGS[ev.id]||[];
  const wait=WAIT[ev.id]||[];
  const reg=regs.length; const cap=ev.capacity;
  const full=reg>=cap;
  const isReg=regs.includes(userEmail);
  const isWait=wait.includes(userEmail);
  const p=pct(reg,cap);
  let btn="";
  if(role==="participant"||role==="both"){
    const cls=isReg?"btn-success":isWait?"btn-ghost":full?"btn-ghost btn-xs":"btn-pri";
    const lbl=isReg?"✓ Registered":isWait?"⏳ Waitlisted":full?"Join Waitlist":"Register Now";
    btn=`<button class="btn ${cls} btn-sm btn-w" style="margin-top:10px" onclick="event.stopPropagation();doRegisterLocal('${ev.id}')">${lbl}</button>`;
  }
  return `<div class="card card-click" onclick="go('ev-detail',true,{evId:'${ev.id}'})">
    <div style="height:3px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,${ev.color},var(--pk));margin:-20px -20px 14px;position:relative;top:-1px;border-radius:var(--r) var(--r) 0 0"></div>
    <div style="display:flex;align-items:flex-start;gap:11px;margin-bottom:10px">
      <div style="width:46px;height:46px;border-radius:12px;background:${ev.color}18;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${ev.emoji}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-h);font-weight:800;font-size:14px;color:var(--t1);margin-bottom:4px;line-height:1.2">${ev.title}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap"><span class="b b-p">${ev.category}</span>${ev.free?'<span class="b b-g">Free</span>':'<span class="b b-o">₹'+ev.price+'</span>'}${(role!=="participant"&&role!=="both")?`<span class="b ${ev.status==="approved"?"b-g":ev.status==="pending"?"b-y":"b-r"}">${ev.status}</span>`:""}</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px">${ev.desc}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;color:var(--t2);margin-bottom:10px">
      <span>📅 ${fmt(ev.date)}</span><span>⏰ ${ev.time}</span>
      <span>📍 ${ev.venue}</span><span>👤 ${ev.organizer}</span>
    </div>
    ${capBar(reg,cap)}
    ${wait.length>0?`<div style="font-size:11px;color:var(--or);margin-top:4px">⏳ ${wait.length} on waitlist</div>`:""}
    ${btn}
  </div>`;
}

            <span style="font-weight:700">You:</span> ${CU.name} (${CU.email})

    const email=$("co-org-email").value.trim();
    if(!email){toast("Enter an email","re");return;}
    if(!email.endsWith("@scet.ac.in")){toast("⚠️ Only @scet.ac.in email addresses are allowed","re");return;}
    if(email===CU.email){toast("You are already the primary organiser","or");return;}
    if(coOrgs.includes(email)){toast("Already added","or");return;}

      prizes:$("f-prizes").value, contact:$("f-contact").value,
      schedule, status:"pending", organizer:CU.name, orgId:CU.email,
      organizers, uni:CU.uni,
    };
    EVTS.push(nev); REGS[nev.id]=[]; WAIT[nev.id]=[];
    firebaseSaveEvent(nev);
    // notify admin
    pushNotif("admin@scet.ac.in", `📋 New event "${title}" submitted for approval by ${CU.name}`, "or", {view:"adm-events"});

    coOrgs.forEach(email=>{ pushNotif(email, `🤝 ${CU.name} added you as co-organiser for "${title}"`, "p", {view:"org-events"}); });
    toast("🎉 Event submitted for admin approval!","gr");
    go("org-events");
  };
};

<script>
VIEWS["discover"] = (area)=>{
  let search="",cat="all",free="all";
  // For "both" role, exclude events they are organising from discover
  const myEvts=EVTS.filter(e=>e.uni===CU.uni&&e.status==="approved"&&!(CU.role==="both"&&(e.organizers||[e.orgId]).includes(CU.email))&&new Date(e.date)>=new Date()).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const cats=["all",...new Set(myEvts.map(e=>e.category))];
  const render=()=>{
    const list=myEvts.filter(e=>{
      const ms=e.title.toLowerCase().includes(search.toLowerCase())||e.desc.toLowerCase().includes(search.toLowerCase());
      const mc=cat==="all"||e.category===cat;
      const mf=free==="all"||(free==="free"?e.free:!e.free);
      return ms&&mc&&mf;
    });
    $("disc-grid").innerHTML=list.length?list.map(ev=>evCard(ev,CU.role,CU.email)).join(""):`<div class="empty" style="grid-column:1/-1"><div class="empty-ico">🔍</div><h3>No events found</h3><p>Try different filters.</p></div>`;
    $("disc-count").textContent=`${list.length} events at ${CU.uni}`;
  };
  area.innerHTML=`
  <div class="card" style="display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:14px;padding:13px">
    <div class="srch-wrap" style="min-width:180px"><span class="srch-ico">🔍</span><input class="srch-in" placeholder="Search events…" oninput="window.ds_search(this.value)"></div>
    <select class="fi" style="width:auto" onchange="window.ds_cat(this.value)">${cats.map(c=>`<option value="${c}">${c==="all"?"All Categories":c}</option>`).join("")}</select>
    <div class="tog-wrap" style="margin:0">
      <div class="tog-opt on" id="tog-all" onclick="window.ds_free('all');setDiscTog('all')">All</div>
      <div class="tog-opt" id="tog-f2" onclick="window.ds_free('free');setDiscTog('free')">Free</div>
      <div class="tog-opt" id="tog-p2" onclick="window.ds_free('paid');setDiscTog('paid')">Paid</div>
    </div>
  </div>
  <div id="disc-count" style="font-size:11px;color:var(--t3);margin-bottom:10px"></div>
  <div id="disc-grid" class="ga"></div>`;
  window.ds_search=v=>{search=v;render()};
  window.ds_cat=v=>{cat=v;render()};
  window.ds_free=v=>{free=v;render()};
  window.setDiscTog=v=>{["tog-all","tog-f2","tog-p2"].forEach(id=>$( id)?.classList.remove("on"));$("tog-"+(v==="all"?"all":v==="free"?"f2":"p2"))?.classList.add("on");};
  window.doRegister=evId=>{ doRegisterLocal(evId); };
  render();
};

VIEWS["my-regs"] = (area)=>{
  let regsSearch="";
  // For "both" role: only show events they're participating in (not organising)
  const isOrgOf=ev=>(ev.organizers||[ev.orgId]).includes(CU.email);
  // Compute live from REGS so cancellations are immediately reflected
  const getLiveRegEvts=()=>EVTS.filter(e=>(REGS[e.id]||[]).includes(CU.email)&&!isOrgOf(e));
  const getLiveWaitEvts=()=>EVTS.filter(e=>(WAIT[e.id]||[]).includes(CU.email)&&!isOrgOf(e));
  const getLivePastEvts=()=>EVTS.filter(e=>new Date(e.date)<new Date()&&(REGS[e.id]||[]).includes(CU.email)&&!isOrgOf(e));

    openModal("Cancel Registration?",`<div style="text-align:center;padding:10px"><div style="font-size:36px;margin-bottom:10px">⚠️</div><div style="font-family:var(--font-h);font-weight:800;font-size:16px;margin-bottom:8px">Cancel registration for ${evCheck.emoji} ${evCheck.title}?</div><div style="font-size:12px;color:var(--re);margin-top:8px;font-weight:600">This cannot be undone.</div></div>`,

    );

  window.showTicket=seed=>{ openModal("🎫 Ticket",`<div style="text-align:center;padding:10px"><div style="display:grid;grid-template-columns:repeat(7,18px);gap:3px;width:126px;margin:0 auto 12px">${qrDiv(seed,126)}</div><div style="font-family:monospace;font-weight:800;color:var(--p);font-size:14px">CP-${seed.slice(0,8).toUpperCase()}</div><div style="font-size:12px;color:var(--t3);margin-top:6px">Scan at event entrance</div></div>`,[]); };

};

</script>
<script>
VIEWS["ev-team"] = (area, data)=>{
  const ev=EVTS.find(e=>e.id===data?.evId);
  if(!ev){area.innerHTML="<p>Event not found</p>";return;}
  const team=TEAMS_DB[ev.id]||[];
  const tasks=WORK_STATUS[ev.id]||[];
  const isOrg=(ev.organizers||[ev.orgId]).includes(CU.email)||CU.role==="admin";
  const chatKey="teamchat_"+ev.id;
  if(!TEAM_CHATS[chatKey]) TEAM_CHATS[chatKey]=[];
  const msgs=TEAM_CHATS[chatKey];

  const doneCount=tasks.filter(t=>t.status==="done").length;
  const inProg=tasks.filter(t=>t.status==="in-progress").length;
  const pending=tasks.filter(t=>t.status==="pending").length;
  const pct100=tasks.length?Math.round(doneCount/tasks.length*100):0;

  const statusBadge=s=>s==="done"?'<span class="b b-g">Done</span>':s==="in-progress"?'<span class="b b-o">In Progress</span>':'<span class="b b-y">Pending</span>';
  const priBadge=p=>p==="high"?'<span style="font-size:10px;color:var(--re);font-weight:700">HIGH</span>':p==="med"?'<span style="font-size:10px;color:var(--or);font-weight:700">MED</span>':'<span style="font-size:10px;color:var(--t3);font-weight:700">LOW</span>';

  const renderChat=()=>{
    const el=document.getElementById("team-msgs"); if(!el)return;
    el.innerHTML=msgs.length?msgs.map(m=>{
      const isMe=m.from===CU.email;
      return `<div style="display:flex;flex-direction:${isMe?"row-reverse":"row"};align-items:flex-end;gap:7px;margin-bottom:10px">
        <div style="width:28px;height:28px;border-radius:7px;background:${gradCss(m.av||"AB")};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${m.av}</div>
        <div style="max-width:70%">
          <div style="font-size:10px;color:var(--t3);margin-bottom:3px;${isMe?"text-align:right":""}">${m.name} · ${m.time}</div>
          <div style="background:${isMe?"var(--p)":"var(--card)"};color:${isMe?"#fff":"var(--t1)"};border:${isMe?"none":"1px solid var(--bdr)"};border-radius:${isMe?"12px 12px 3px 12px":"12px 12px 12px 3px"};padding:9px 12px;font-size:13px;line-height:1.4">${m.text}</div>
        </div>
      </div>`;
    }).join(""):`<div style="text-align:center;padding:30px;color:var(--t3)"><p>No team messages yet. Start the conversation!</p></div>`;
    el.scrollTop=el.scrollHeight;
  };

  area.innerHTML=`
  <!-- Header -->
  <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:14px">
    <span style="font-size:28px">${ev.emoji}</span>
    <div style="flex:1"><div style="font-family:var(--font-h);font-weight:800;font-size:15px">${ev.title}</div>
    <div style="font-size:12px;color:var(--t2)">Team dashboard · ${team.length} team members</div></div>
    <div style="display:flex;gap:7px;font-size:12px">
      <span class="b b-g">${doneCount} done</span>
      <span class="b b-o">${inProg} active</span>
      <span class="b b-y">${pending} pending</span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-family:var(--font-h);font-weight:800;font-size:14px">Overall Progress</div>
      <div style="font-size:20px;font-weight:800;color:var(--p)">${pct100}%</div>
    </div>
    <div style="height:10px;background:var(--bg);border-radius:10px;overflow:hidden">
      <div style="height:100%;width:${pct100}%;background:linear-gradient(90deg,var(--p),var(--pk));border-radius:10px;transition:width .5s"></div>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-top:6px">${doneCount} of ${tasks.length} tasks completed</div>
  </div>

  <div class="g2" style="margin-bottom:14px">
    <!-- Team Members -->
    <div class="card">
      <div class="sec-title" style="margin-bottom:12px">Team Members <span class="b b-p">${team.length}</span></div>
      ${team.length?team.map(m=>`
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)">
        <div style="width:36px;height:36px;border-radius:9px;background:${gradCss(m.av)};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0">${m.av}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${m.name}</div>
          <div style="font-size:11px;color:var(--t3)">${m.role} · ${m.dept} · ${m.year}</div>
          <div style="font-size:11px;color:var(--t2)">📞 ${m.phone}</div>
        </div>
        <div style="font-size:11px;color:var(--t3);max-width:90px;word-break:break-all">${m.email}</div>
      </div>`).join(""):`<div style="color:var(--t3);font-size:13px;padding:12px 0">No team members added yet.</div>`}
      ${isOrg?`<button class="btn btn-sec btn-sm btn-w" style="margin-top:12px" onclick="addTeamMember('${ev.id}')">+ Add Member</button>`:""}
    </div>

    <!-- Work Tasks -->
    <div class="card">
      <div class="sec-title" style="margin-bottom:12px">Work Tasks</div>
      ${tasks.map(t=>`
      <div style="display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--bdr)">
        <div style="margin-top:2px">
          ${isOrg?`<input type="checkbox" ${t.status==="done"?"checked":""} onchange="toggleTask('${ev.id}','${t.id}',this.checked)" style="width:15px;height:15px;cursor:pointer">`:'<div style="width:15px;height:15px;border-radius:4px;background:'+(t.status==="done"?"var(--gr)":t.status==="in-progress"?"var(--or)":"var(--ye-l)")+'"></div>'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px;${t.status==="done"?"text-decoration:line-through;color:var(--t3)":""}">${t.task}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px">Assignee: ${t.assignee.split("@")[0]} · Due: ${fmt(t.due)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          ${statusBadge(t.status)}
          ${priBadge(t.priority)}
        </div>
      </div>`).join("")||`<div style="color:var(--t3);font-size:13px;padding:12px 0">No tasks added yet.</div>`}
      ${isOrg?`<button class="btn btn-sec btn-sm btn-w" style="margin-top:12px" onclick="addTask('${ev.id}')">+ Add Task</button>`:""}
    </div>
  </div>

  <!-- Team Chat -->
  <div class="card" style="display:flex;flex-direction:column">
    <div class="sec-title" style="margin-bottom:10px">Team Chat</div>
    <div id="team-msgs" style="height:260px;overflow-y:auto;margin-bottom:10px;padding:2px"></div>
    <div style="display:flex;gap:8px">
      <input id="team-msg-input" class="fi" placeholder="Message your team..." style="flex:1;margin:0" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTeamMsg('${ev.id}')}">
      <button class="btn btn-pri" onclick="sendTeamMsg('${ev.id}')">Send</button>
    </div>
  </div>`;

  window.sendTeamMsg=evId=>{
    const inp=document.getElementById("team-msg-input"); if(!inp)return;
    const text=inp.value.trim(); if(!text)return;
    const key="teamchat_"+evId;
    if(!TEAM_CHATS[key]) TEAM_CHATS[key]=[];
    const now=new Date(); const t=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    TEAM_CHATS[key].push({from:CU.email,name:CU.name,av:CU.av,text,time:t,ts:Date.now()});
    // notify co-organizers
    const evv=EVTS.find(e=>e.id===evId);
    (evv?.organizers||[]).filter(e=>e!==CU.email).forEach(org=>pushNotif(org,`💬 Team: ${CU.name} posted in ${evv.title} team chat`,"p",{view:"ev-chat",data:{evId}}));
    inp.value=""; renderChat();
  };
  window.toggleTask=(evId,taskId,done)=>{
    const t=(WORK_STATUS[evId]||[]).find(x=>x.id===taskId); if(!t)return;
    t.status=done?"done":"pending";
    // re-render inline — just update the line-through
    const row=document.querySelector(`input[onchange*="${taskId}"]`)?.closest("div[style*='border-bottom']");
    if(row){ const title=row.querySelector("div[style*='font-weight:700']"); if(title) title.style.cssText=done?"text-decoration:line-through;color:var(--t3)":""; }
    // update progress bar
    const tasks2=WORK_STATUS[evId]||[]; const done2=tasks2.filter(x=>x.status==="done").length;
    const pBar=document.querySelector("div[style*='linear-gradient(90deg,var(--p)']");
    if(pBar) pBar.style.width=Math.round(done2/tasks2.length*100)+"%";
  };
  window.addTeamMember=evId=>{
    openModal("Add Team Member","<div class='fg g2'><input class='fi' id='tm-name' placeholder='Full Name'><input class='fi' id='tm-email' placeholder='Email (@scet.ac.in)'><input class='fi' id='tm-phone' placeholder='Phone'><input class='fi' id='tm-dept' placeholder='Department'><input class='fi' id='tm-year' placeholder='Year (e.g. 2nd Year)'><input class='fi' id='tm-role' placeholder='Role (e.g. Logistics Head)'></div>",
      [{label:"Add",cls:"btn-pri",fn:`(()=>{const n=document.getElementById('tm-name').value.trim();const em=document.getElementById('tm-email').value.trim();const ph=document.getElementById('tm-phone').value.trim();const dep=document.getElementById('tm-dept').value.trim();const yr=document.getElementById('tm-year').value.trim();const rl=document.getElementById('tm-role').value.trim();if(!n||!em){toast('Name and email required','re');return;}if(!em.endsWith('@scet.ac.in')){toast('Only @scet.ac.in emails allowed','re');return;}if(!TEAMS_DB['${evId}'])TEAMS_DB['${evId}']=[];TEAMS_DB['${evId}'].push({email:em,name:n,dept:dep,phone:ph,year:yr,role:rl,av:n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()});closeModal();toast('Team member added!','gr');go('ev-team',false,{evId:'${evId}'});go('ev-team',true,{evId:'${evId}'});})()`},{label:"Cancel",cls:"btn-ghost",fn:"closeModal()"}]
    );
  };
  window.addTask=evId=>{
    openModal("Add Task","<div class='fg'><input class='fi' id='tk-task' placeholder='Task description'><input class='fi' id='tk-assign' placeholder='Assignee email (@scet.ac.in)'><input class='fi' id='tk-due' type='date'><select class='fi' id='tk-pri'><option value='high'>High Priority</option><option value='med' selected>Medium</option><option value='low'>Low</option></select></div>",
      [{label:"Add",cls:"btn-pri",fn:`(()=>{const t=document.getElementById('tk-task').value.trim();const a=document.getElementById('tk-assign').value.trim()||CU.email;const d=document.getElementById('tk-due').value;const p=document.getElementById('tk-pri').value;if(!t){toast('Enter task description','re');return;}if(!WORK_STATUS['${evId}'])WORK_STATUS['${evId}']=[];const id='w'+(WORK_STATUS['${evId}'].length+1);WORK_STATUS['${evId}'].push({id,task:t,assignee:a,status:'pending',due:d||'TBD',priority:p});closeModal();toast('Task added!','gr');go('ev-team',false,{evId:'${evId}'});go('ev-team',true,{evId:'${evId}'});})()`},{label:"Cancel",cls:"btn-ghost",fn:"closeModal()"}]
    );
  };
  renderChat();
};

/* ══════════════════════════════════════════════════════════
   PAYMENT DASHBOARD VIEW (Organiser sees all, Admin sees analytics)
   ══════════════════════════════════════════════════════════ */
VIEWS["ev-payments"] = (area, data)=>{
  const ev=EVTS.find(e=>e.id===data?.evId);
  if(!ev){area.innerHTML="<p>Event not found</p>";return;}
  if(ev.free){area.innerHTML=`<div class="empty"><div class="empty-ico">🆓</div><h3>Free Event</h3><p>No payment tracking needed.</p></div>`;return;}

  const regs=REGS[ev.id]||[];
  const payMap=PAYMENTS[ev.id]||{};
  const isAdmin=CU.role==="admin";

  // Build payment records for all registered participants
  const IPNAMES=["Aarav Shah","Aditi Patel","Akash Verma","Ananya Mehta","Arjun Singh","Bhavya Joshi","Chirag Gupta","Deepika Rao","Dhruv Nair","Esha Reddy","Farhan Khan","Gauri Desai","Harshit Sharma","Ishaan Kulkarni","Jahnvi Thakur","Karthik Iyer","Kavya Pillai","Lakshmi Bose","Manish Chandra","Meghna Dubey"];
  function hc2(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return Math.abs(h);}
  const getDeptList2=["CS","EC","IT","AI","MECH","CHEM","IC","CIVIL"];
  const getP2=email=>{if(PARTICIPANTS_DB[email])return PARTICIPANTS_DB[email];const h=hc2(email);return{name:IPNAMES[h%IPNAMES.length],dept:getDeptList2[h%getDeptList2.length],phone:"+91 9"+String(7000000000+(h%2999999999)).slice(0,10),av:(IPNAMES[h%IPNAMES.length].split(" ").map(w=>w[0]).join("")).slice(0,2).toUpperCase()};};
  const records=regs.map(email=>{
    const p=getP2(email)||{name:email.split("@")[0],dept:"N/A",phone:"N/A"};
    const pay=payMap[email]||{status:"pending",method:null,amount:ev.price,date:null};
    return {...p,email,...pay};
  });

  const paid=records.filter(r=>r.status==="paid");
  const pending=records.filter(r=>r.status==="pending");
  const waived=records.filter(r=>r.status==="waived");
  const online=paid.filter(r=>r.method==="online").length;
  const cash=paid.filter(r=>r.method==="cash").length;
  const totalCollected=paid.reduce((s,r)=>s+(r.amount||0),0);

  const statusBadge=r=>r.status==="paid"?`<span class="b b-g">${r.method==="online"?"Online":"Cash"}</span>`:r.status==="waived"?'<span class="b b-bl">Waived</span>':'<span class="b b-y">Pending</span>';

  area.innerHTML=`
  <!-- Header -->
  <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:14px">
    <span style="font-size:28px">${ev.emoji}</span>
    <div style="flex:1"><div style="font-family:var(--font-h);font-weight:800;font-size:15px">${ev.title}</div>
    <div style="font-size:12px;color:var(--t2)">Entry fee: Rs ${ev.price} · ${regs.length} registered</div></div>
    ${isAdmin?`<button class="btn btn-sec btn-sm" onclick="go('adm-analytics')">Analytics</button>`:""}
  </div>

  <!-- Stats -->
  <div class="g4" style="margin-bottom:14px">
    ${scard("Rs",totalCollected.toLocaleString("en-IN"),"Total Collected","","gr")}
    ${scard("✅",paid.length,"Paid","","p")}
    ${scard("⏳",pending.length,"Pending","","or")}
    ${scard("🎫",waived.length,"Waived","Organisers/Staff","ye")}
  </div>

  ${isAdmin?`<!-- Admin: payment method chart -->
  <div class="g2" style="margin-bottom:14px">
    <div class="ch-card"><div class="ch-title">Payment Method Split</div><div class="ch-sub">Online vs Cash</div><div class="ch-wrap"><canvas id="ch-pay-method"></canvas></div></div>
    <div class="ch-card"><div class="ch-title">Payment Status</div><div class="ch-sub">All participants</div><div class="ch-wrap"><canvas id="ch-pay-status"></canvas></div></div>
  </div>`:""}

  <!-- Participant Payment Table -->
  <div class="card">
    <div class="sec-title" style="margin-bottom:12px">
      Participant Payment Details
      ${!isAdmin?`<button class="btn btn-ghost btn-sm" onclick="exportPaymentsCSV('${ev.id}')">Export CSV</button>`:""}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Participant</th><th>Dept</th><th>Phone</th><th>Amount</th><th>Status</th><th>Date</th>${!isAdmin?"<th>Action</th>":""}</tr></thead>
      <tbody>
        ${records.map(r=>`<tr>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:30px;height:30px;border-radius:8px;background:${gradCss(r.av||"AB")};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff">${r.av||"?"}</div>
              <div><div class="cell-t">${r.name}</div><div class="cell-s">${r.email}</div></div>
            </div>
          </td>
          <td>${r.dept||"N/A"}</td>
          <td>${r.phone||"N/A"}</td>
          <td><strong>${r.status==="waived"?"Waived":"Rs "+r.amount}</strong></td>
          <td>${statusBadge(r)}</td>
          <td>${r.date?fmt(r.date):"—"}</td>
          ${!isAdmin?`<td onclick="event.stopPropagation()">
            ${r.status==="pending"?`<div style="display:flex;gap:4px">
              <button class="btn btn-success btn-xs" onclick="markPayment('${ev.id}','${r.email}','online')">Online</button>
              <button class="btn btn-sec btn-xs" onclick="markPayment('${ev.id}','${r.email}','cash')">Cash</button>
            </div>`:r.status==="paid"?`<button class="btn btn-ghost btn-xs" onclick="markPayment('${ev.id}','${r.email}','undo')">Undo</button>`:"—"}
          </td>`:""}
        </tr>`).join("")}
      </tbody>
    </table></div>
  </div>`;

  if(isAdmin){
    requestAnimationFrame(()=>{
      const mc=document.getElementById("ch-pay-method");
      const sc=document.getElementById("ch-pay-status");
      if(mc) new Chart(mc,{type:"doughnut",data:{labels:["Online","Cash"],datasets:[{data:[online,cash],backgroundColor:["#7C3AED","#10B981"],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"right",labels:{font:{size:11}}}}}});
      if(sc) new Chart(sc,{type:"doughnut",data:{labels:["Paid","Pending","Waived"],datasets:[{data:[paid.length,pending.length,waived.length],backgroundColor:["#10B981","#F97316","#94A3B8"],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"right",labels:{font:{size:11}}}}}});
    });
  }

  window.markPayment=(evId,email,action)=>{
    if(!PAYMENTS[evId]) PAYMENTS[evId]={};
    const evv=EVTS.find(e=>e.id===evId);
    const now=new Date().toISOString().split("T")[0];
    if(action==="undo"){ PAYMENTS[evId][email]={status:"pending",method:null,amount:evv?.price||0,date:null}; }
    else { PAYMENTS[evId][email]={status:"paid",method:action,amount:evv?.price||0,date:now}; }
    pushNotif(email,action==="undo"?`Payment status reset for "${evv?.title}".`:`Payment confirmed (${action}) for "${evv?.title}".`,"gr");
    toast(action==="undo"?"Payment reset":"Payment marked as "+action,"gr");
    go("ev-payments",false,{evId}); go("ev-payments",true,{evId});
  };
  window.exportPaymentsCSV=evId=>{
    const evv=EVTS.find(e=>e.id===evId); const regs2=REGS[evId]||[]; const pm=PAYMENTS[evId]||{};
    const rows=[["Name","Email","Dept","Phone","Amount","Status","Method","Date"]];
    regs2.forEach(email=>{ const p=PARTICIPANTS_DB[email]||{name:email.split("@")[0],dept:"N/A",phone:"N/A"}; const pay=pm[email]||{status:"pending",method:"",amount:evv?.price,date:""}; rows.push([p.name,email,p.dept,p.phone,pay.amount,pay.status,pay.method||"",pay.date||""]); });
    const csv=rows.map(r=>r.join(",")).join("\n"); const a=document.createElement("a"); a.href="data:text/csv,"+encodeURIComponent(csv); a.download=`payments_${evId}.csv`; a.click();
    toast("CSV downloaded","gr");
  };
};

/* ══════════════════════════════════════════════════════════
   VENUE CALENDAR VIEW
   ══════════════════════════════════════════════════════════ */
VIEWS["venue-calendar"] = (area, data)=>{
  const venueId=data?.venueId, venueName=data?.venueName||"Venue";
  const bookings=(VENUE_BOOKINGS[venueId]||[]);
  const approvedBookings=bookings.filter(b=>b.status==="approved");
  const pendingBookings=bookings.filter(b=>b.status==="pending");

  // Build calendar for 6 months from Jan 2026
  const allEventDates={};
  approvedBookings.forEach(b=>{ allEventDates[b.date]={type:"approved",title:b.eventTitle,eventId:b.eventId}; });
  pendingBookings.forEach(b=>{ allEventDates[b.date]={type:"pending",title:b.eventTitle,eventId:b.eventId}; });

  const months=[{y:2026,m:0},{y:2026,m:1},{y:2026,m:2},{y:2026,m:3},{y:2026,m:4},{y:2026,m:5}];
  const monthNames=["January","February","March","April","May","June"];
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const renderMonth=(y,m)=>{
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    let cells="";
    for(let i=0;i<firstDay;i++) cells+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const ev=allEventDates[dateStr];
      const today=new Date().toISOString().split("T")[0];
      const isToday=dateStr===today;
      let bg="transparent", color="var(--t1)", title="";
      if(ev){
        bg=ev.type==="approved"?"var(--re)":"var(--ye)";
        color="#fff"; title=`title="${ev.title}"`;
      }
      cells+=`<div ${title} style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:${isToday?"800":"500"};background:${bg};color:${color};border:${isToday?"2px solid var(--p)":"none"};cursor:${ev?"pointer":"default"};position:relative" ${ev?`onclick="go('ev-detail',true,{evId:'${ev.eventId}'})"`:""}>
        ${d}${ev?`<div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#fff;opacity:.8"></div>`:""}
      </div>`;
    }
    return cells;
  };

  area.innerHTML=`
  <div class="card" style="margin-bottom:14px;padding:16px">
    <div style="font-family:var(--font-h);font-weight:800;font-size:18px;margin-bottom:4px">📅 ${venueName}</div>
    <div style="font-size:13px;color:var(--t2)">Booking calendar · 2026</div>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:14px;height:14px;border-radius:4px;background:var(--re)"></div>Booked / Occupied</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:14px;height:14px;border-radius:4px;background:var(--ye)"></div>Pending Approval</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:14px;height:14px;border-radius:4px;background:var(--gr)"></div>Available</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:14px;height:14px;border-radius:4px;border:2px solid var(--p)"></div>Today</div>
    </div>
  </div>

  <div class="g2" style="gap:12px">
    ${months.map(({y,m})=>`
    <div class="card">
      <div style="font-family:var(--font-h);font-weight:800;font-size:14px;margin-bottom:12px;text-align:center">${monthNames[m]} ${y}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:2px">${d}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${renderMonth(y,m)}
      </div>
    </div>`).join("")}
  </div>

  <!-- Booked dates list -->
  <div class="card" style="margin-top:14px">
    <div class="sec-title" style="margin-bottom:10px">All Bookings</div>
    ${[...approvedBookings,...pendingBookings].length?[...approvedBookings,...pendingBookings].sort((a,b)=>a.date.localeCompare(b.date)).map(b=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);cursor:pointer" onclick="go('ev-detail',true,{evId:'${b.eventId}'})">
      <div style="width:10px;height:10px;border-radius:50%;background:${b.status==="approved"?"var(--re)":"var(--ye)"};flex-shrink:0"></div>
      <div style="flex:1"><div style="font-weight:700;font-size:13px">${b.eventTitle}</div>
      <div style="font-size:11px;color:var(--t2)">📅 ${fmt(b.date)}</div></div>
      <span class="b ${b.status==="approved"?"b-g":"b-y"}">${b.status}</span>
    </div>`).join(""):`<div style="text-align:center;padding:20px;color:var(--t3)">No bookings for this venue.</div>`}
  </div>`;
};

/* ── PARTICIPANT ↔ ORGANISER CHAT ── */
VIEWS["p-org-chat"] = (area, data)=>{
  const evId=data?.evId;
  const orgEmailRaw=data?.orgEmail||data?.orgId;
  const ev=EVTS.find(e=>e.id===evId);
  if(!ev){area.innerHTML="<p style='padding:20px'>Event not found</p>";return;}

  const allOrgs=(ev.organizers||[ev.orgId]).filter(Boolean);
  const isOrgViewing=allOrgs.includes(CU.email);

  // Determine participant and organiser email for this thread
  let partEmail, orgEmail;
  if(isOrgViewing){
    // Organiser is viewing → participant email must be passed in data
    partEmail=data?.participantEmail||data?.partEmail||"";
    orgEmail=CU.email;
  } else {
    // Participant is viewing → their own email is the participant
    partEmail=CU.email;
    orgEmail=orgEmailRaw&&allOrgs.includes(orgEmailRaw)?orgEmailRaw:(allOrgs[0]||"");
  }

  // Chat key always uses participant email so both sides share the same thread
  const chatKey="porgchat_"+evId+"_"+partEmail;
  if(!CHATS[chatKey]) CHATS[chatKey]=[];
  const msgs=CHATS[chatKey];

  // Get other person's info
  const otherEmail=isOrgViewing?partEmail:orgEmail;
  const otherRaw=PARTICIPANTS_DB[otherEmail]||ORGANIZERS_DB[otherEmail]||USERS[otherEmail]||{};
  const otherName=otherRaw.name||otherEmail.split("@")[0]||"User";
  const otherAv=(otherRaw.av||otherName.slice(0,2)||"?").toUpperCase().slice(0,2);
  const otherPhone=otherRaw.phone||"N/A";
  const otherGrad=gradCss(otherAv);
  const otherRole=isOrgViewing?"Participant":"Organiser";

  if(!msgs.length && !isOrgViewing){
    // Seed welcome message from organiser when participant opens fresh
    const orgD=ORGANIZERS_DB[orgEmail]||USERS[orgEmail]||{};
    const orgN=orgD.name||orgEmail.split("@")[0];
    const orgA=(orgD.av||orgN.slice(0,2)||"OR").toUpperCase().slice(0,2);
    msgs.push({from:orgEmail,name:orgN,av:orgA,
      text:"Hi! I am "+orgN+", organiser of "+ev.title+". Feel free to ask any questions.",
      time:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),ts:1});
  }

  const renderMsgsLocal=()=>{
    const el=$("p-org-msgs"); if(!el)return;
    el.innerHTML=msgs.map(m=>{
      const isMe=m.from===CU.email;
      const dir=isMe?"row-reverse":"row";
      const avS=(m.av||"?").toUpperCase().slice(0,2);
      const bgC=gradCss(avS);
      const bBg=isMe?"var(--p)":"var(--card)";
      const bCol=isMe?"#fff":"var(--t1)";
      const bBdr=isMe?"none":"1px solid var(--bdr)";
      const bRad=isMe?"14px 14px 4px 14px":"14px 14px 14px 4px";
      const nAlign=isMe?"text-align:right":"";
      return "<div style='display:flex;flex-direction:"+dir+";align-items:flex-end;gap:8px;margin-bottom:12px'>"
        +"<div style='width:30px;height:30px;border-radius:8px;background:"+bgC+";display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0'>"+avS+"</div>"
        +"<div style='max-width:72%'><div style='font-size:10px;color:var(--t3);margin-bottom:3px;"+nAlign+"'>"+m.name+" &middot; "+m.time+"</div>"
        +"<div style='background:"+bBg+";color:"+bCol+";border:"+bBdr+";border-radius:"+bRad+";padding:10px 13px;font-size:13px;line-height:1.45'>"+m.text+"</div>"
        +"</div></div>";
    }).join("");
    el.scrollTop=el.scrollHeight;
  };

  const headerTitle=isOrgViewing
    ?("Chat with "+otherName)
    :("Chat with Organiser");
  const headerSub=isOrgViewing
    ?(otherPhone+" &middot; "+ev.title)
    :(otherRole+" &middot; "+ev.title+" &middot; "+otherPhone);

  area.innerHTML="<div style='max-width:700px;margin:0 auto;display:flex;flex-direction:column;height:calc(100vh - 140px)'>"
    +"<div class='card' style='display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:14px;flex-shrink:0'>"
    +"<div style='width:42px;height:42px;border-radius:11px;background:"+otherGrad+";display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px'>"+otherAv+"</div>"
    +"<div style='flex:1'><div style='font-family:var(--font-h);font-weight:800;font-size:14px'>"+headerTitle+"</div>"
    +"<div style='font-size:11px;color:var(--t3)'>"+headerSub+"</div></div>"
    +"<button class='btn btn-ghost btn-sm' onclick='goBack()'>Back</button></div>"
    +"<div id='p-org-msgs' style='flex:1;overflow-y:auto;padding:4px 2px;margin-bottom:12px'></div>"
    +"<div class='card' style='padding:11px;flex-shrink:0'><div style='display:flex;gap:8px'>"
    +"<input id='p-org-input' class='fi' placeholder='Type a message...' style='flex:1;margin:0'>"
    +"<button class='btn btn-pri' id='p-org-send-btn'>Send</button>"
    +"</div></div></div>";

  const inp=$("p-org-input"); const sendBtn=$("p-org-send-btn");
  const doSend=()=>{
    if(!inp||!inp.value.trim())return;
    const text=inp.value.trim();
    const timeStr=new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    const avMe=(CU.av||CU.name?.slice(0,2)||"?").toUpperCase().slice(0,2);
    msgs.push({from:CU.email,name:CU.name,av:avMe,text,time:timeStr,ts:Date.now()});
    // Notify the OTHER person
    const notifTarget=isOrgViewing?partEmail:orgEmail;
    if(notifTarget) pushNotif(notifTarget,(isOrgViewing?CU.name+" (Organiser) replied":"Message from "+CU.name)+": "+text.slice(0,60)+(text.length>60?"...":""),"p");
    inp.value=""; renderMsgsLocal();
  };
  if(inp&&inp.addEventListener) inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}});
  if(sendBtn&&sendBtn.addEventListener) sendBtn.addEventListener("click",doSend);
  renderMsgsLocal();
};



/* ── FEATURE 1: EVENT CHAT (Admin ↔ Organiser) ── */
VIEWS["ev-chat"] = (area, data)=>{
  const evId=data?.evId, orgEmail=data?.orgEmail;
  const ev=EVTS.find(e=>e.id===evId);
  if(!ev){area.innerHTML="<p>Event not found</p>";return;}
  const chatId="chat_"+evId;
  if(!CHATS[chatId]) CHATS[chatId]=[];
  const isAdmin=CU.role==="admin";
  const other = isAdmin
    ? (ORGANIZERS_DB[orgEmail]||{name:orgEmail,av:"OR"})
    : (USERS["admin@scet.ac.in"]||{name:"Dr. Priya Nair",av:"PN"});

  const renderMsgs=()=>{
    const msgs=CHATS[chatId];
    const el=$("chat-msgs"); if(!el)return;
    el.innerHTML=msgs.length?msgs.map(m=>{
      const mine=m.from===CU.email;
      return `<div style="display:flex;flex-direction:${mine?"row-reverse":"row"};gap:8px;align-items:flex-end;margin-bottom:12px">
        <div style="width:30px;height:30px;border-radius:8px;background:${gradCss(m.from.slice(0,2).toUpperCase())};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${m.from.slice(0,2).toUpperCase()}</div>

          <div style="font-size:10px;color:var(--t3);margin-bottom:3px;${mine?"text-align:right":""}">${m.name} · ${m.time}</div>
          <div style="background:${mine?"var(--p)":"var(--card)"};color:${mine?"#fff":"var(--t1)"};border:${mine?"none":"1px solid var(--bdr)"};border-radius:${mine?"14px 14px 2px 14px":"14px 14px 14px 2px"};padding:10px 13px;font-size:13px;line-height:1.5">${m.text}</div>
        </div>
      </div>`;
    }).join(""):`<div style="text-align:center;padding:40px;color:var(--t3)">No messages yet. Start the conversation!</div>`;
    el.scrollTop=el.scrollHeight;
  };

  area.innerHTML=`
  <div class="card" style="margin-bottom:12px;padding:14px">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:24px">${ev.emoji}</span>
      <div style="flex:1">
        <div style="font-weight:800;font-size:14px">${ev.title}</div>
        <div style="font-size:12px;color:var(--t2)">Chat with ${isAdmin?other.name:"Admin — Dr. Sarah Chen"}</div>
      </div>
      <span class="b b-y">⏳ Pending</span>
    </div>
  </div>
  ${!isAdmin?`<div style="background:var(--or-l);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:12px;color:var(--or)">⏳ <strong>Admin is reviewing your event.</strong> Use this chat to answer queries. Event stays pending until admin approves or rejects.</div>`:""}
  <div class="card" style="display:flex;flex-direction:column;height:420px">
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:10px"></div>
    <div style="border-top:1px solid var(--bdr);padding:10px;display:flex;gap:8px;align-items:flex-end">
      <textarea id="chat-input" class="fi" rows="2" placeholder="Type your message…" style="flex:1;resize:none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat('${chatId}');}"></textarea>
      <button class="btn btn-pri btn-sm" onclick="sendChat('${chatId}')">Send →</button>
    </div>
  </div>`;

  window.sendChat=(cId)=>{
    const inp=$("chat-input"); if(!inp)return;
    const text=inp.value.trim(); if(!text)return;
    const now=new Date();
    const msg={from:CU.email,name:CU.name,text,time:now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),ts:Date.now()};
    CHATS[cId].push(msg);
    inp.value="";
    // notify the other party
    if(CU.role==="admin"){
      // Admin → notify organiser
      const orgEm=(ev.organizers||[ev.orgId])[0];
      pushNotif(orgEm,`💬 Admin ${CU.name} replied on "${ev.title}": ${text.slice(0,60)}${text.length>60?"…":""}`,"p",{view:"ev-chat",data:{evId:ev.id,orgEmail:orgEm}});
    } else {
      // Organiser → notify both admins
      pushNotif("admin@scet.ac.in",`💬 ${CU.name} (re: ${ev.title}): ${text.slice(0,60)}${text.length>60?"…":""}`,"p",{view:"ev-chat",data:{evId:ev.id,orgEmail:CU.email}});
      pushNotif("admin2@scet.ac.in",`💬 ${CU.name} (re: ${ev.title}): ${text.slice(0,60)}${text.length>60?"…":""}`,"p",{view:"ev-chat",data:{evId:ev.id,orgEmail:CU.email}});
    }
    renderMsgs();
  };

  renderMsgs();
};

window.downloadCert=(evId,email)=>{
  const ev=EVTS.find(e=>e.id===evId);
  const p=PARTICIPANTS_DB[email]||USERS[email]||{name:email,av:"XX"};
  const box=document.getElementById("cert-box");
  if(!box){ toast("Certificate not ready — please open it first","re"); return; }

  // Show progress
  const btn = document.querySelector('[onclick*="downloadCert"]');
  if(btn){ btn.textContent="⏳ Preparing…"; btn.disabled=true; }

  // Temporarily expand for full capture
  const orig = {overflow:box.style.overflow, height:box.style.height};
  box.style.overflow="visible"; box.style.height="auto";

  (window.html2canvas ? Promise.resolve() : Promise.reject("no html2canvas"))
    .then(()=> html2canvas(box, {
        scale: 2,
        useCORS: true,
        backgroundColor: null,
        logging: false,
        allowTaint: true
      })
    )
    .then(canvas => {
      // Restore box
      box.style.overflow = orig.overflow; box.style.height = orig.height;

      // Build a clean PNG download
      const dataUrl = canvas.toDataURL("image/png", 1.0);
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = `Planexa_Certificate_${(p.name||email).replace(/\s+/g,"_")}_${evId}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      if(btn){ btn.textContent="⬇ Download"; btn.disabled=false; }
      toast("📜 Certificate downloaded successfully!","gr");
    })
    .catch(err => {
      box.style.overflow = orig.overflow; box.style.height = orig.height;
      console.error("html2canvas error:", err);
      // Fallback: open as printable page
      const win = window.open("","_blank");
      if(win){
        win.document.write(`<!DOCTYPE html><html><head><title>Certificate</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1240;}@media print{body{background:none;}}</style></head><body>${box.outerHTML}</body></html>`);
        win.document.close();
        setTimeout(()=>win.print(), 600);
      }
      if(btn){ btn.textContent="⬇ Download"; btn.disabled=false; }
      toast("📜 Certificate opened for printing","gr");
    });
};

<script>
/* ══════════════════════════════════════════════════════════
   ADMIN ACTIONS
   ══════════════════════════════════════════════════════════ */
function adminApprove(id, note=""){
  const ev=EVTS.find(e=>e.id===id); if(!ev)return;
  ev.status="approved";
  ev.adminNote=note||"Your event has been approved! ✅";
  firebaseSaveEvent(ev);
  // update venue bookings
  const vId=VENUE_NAME_MAP[ev.venue];
  if(vId){
    if(!VENUE_BOOKINGS[vId]) VENUE_BOOKINGS[vId]=[];
    const bk=VENUE_BOOKINGS[vId].find(b=>b.eventId===id);
    if(bk) bk.status="approved";
    else VENUE_BOOKINGS[vId].push({eventId:id,eventTitle:ev.title,date:ev.date,status:"approved"});
  }
  // notify every organiser on this event
  const orgEmails=ev.organizers||[ev.orgId];
  orgEmails.forEach(orgEmail=>{
    pushNotif(orgEmail, `✅ Your event "${ev.title}" has been APPROVED by Admin!${note?" Note: "+note:""}`, "gr", {view:"ev-detail",data:{evId:id}});
  });
  pushNotif(CU.email, `✅ You approved "${ev.title}"`, "gr", {view:"ev-detail",data:{evId:id}});
  toast("✅ Event approved and organisers notified!","gr");
  if(typeof renderPendingDash==="function") setTimeout(renderPendingDash,80);
  // Refresh current view so status updates immediately
  const _curViewA=history[history.length-1];
  if(_curViewA) setTimeout(()=>go(_curViewA.id,false,_curViewA.data),120);
}

function adminReject(id, note=""){
  const ev=EVTS.find(e=>e.id===id); if(!ev)return;
  ev.status="rejected";
  ev.adminNote=note||"Your event has been rejected.";
  firebaseSaveEvent(ev);
  const orgEmails=ev.organizers||[ev.orgId];
  orgEmails.forEach(orgEmail=>{
    pushNotif(orgEmail, `❌ Your event "${ev.title}" was REJECTED.${note?" Reason: "+note:""}`, "re", {view:"ev-detail",data:{evId:id}});
  });
  pushNotif(CU.email, `❌ You rejected "${ev.title}"`, "re", {view:"ev-detail",data:{evId:id}});
  toast("❌ Event rejected and organisers notified","re");
  if(typeof renderPendingDash==="function") setTimeout(renderPendingDash,80);
  // Refresh current view
  const _curView=history[history.length-1];
  if(_curView) setTimeout(()=>go(_curView.id,false,_curView.data),120);
}
function adminApproveWithNote(id){
  window._pendingApproveId=id;
  openModal("✅ Approve Event","<div class='fg'><label class='fl'>Note to Organizer (optional)</label><textarea class='fi' id='approve-note' rows='3' placeholder='e.g. Approved! Please confirm AV setup 2 days before.'></textarea></div>",
    [{label:"Approve",cls:"btn-success",fn:"doApproveConfirm()"},{label:"Cancel",cls:"btn-ghost",fn:"closeModal()"}]
  );
}
window.doApproveConfirm=function(){
  var el=$("approve-note");
  var note=el?el.value:"";
  var id=window._pendingApproveId;
  if(!id){toast("Error: no event selected","re");return;}
  closeModal();
  adminApprove(id, note);
};
function adminRejectWithNote(id){
  window._pendingRejectId=id;
  openModal("❌ Reject Event","<div class='fg'><label class='fl'>Reason for Rejection *</label><textarea class='fi' id='reject-note' rows='3' placeholder='e.g. Venue conflict on that date. Please choose another venue or date.'></textarea></div>",
    [{label:"Reject",cls:"btn-danger",fn:"doRejectConfirm()"},{label:"Cancel",cls:"btn-ghost",fn:"closeModal()"}]
  );
}
window.doRejectConfirm=function(){
  var el=$("reject-note");
  var note=el?el.value:"";
  if(!note.trim()){toast("Please add a reason for rejection","re");return;}
  var id=window._pendingRejectId;
  if(!id){toast("Error: no event selected","re");return;}
